<main>

<section aria-labelledby="contact-heading">

<h2 id="contact-heading">Get In Touch</h2>

<form action="#" method="post" aria-label="Contact Form">

```
<fieldset>
    <legend>Contact Information</legend>

    <label for="name">Full Name</label>
    <input
        type="text"
        id="name"
        name="name"
        required
        autocomplete="name">

    <br><br>

    <label for="email">Email Address</label>
    <input
        type="email"
        id="email"
        name="email"
        required
        autocomplete="email">

    <br><br>

    <label for="subject">Subject</label>
    <input
        type="text"
        id="subject"
        name="subject"
        required>

    <br><br>

    <label for="message">Message</label>
    <textarea
        id="message"
        name="message"
        rows="6"
        required></textarea>

    <br><br>

    <button type="submit">
        Send Message
    </button>

</fieldset>
```

</form>

</section>

</main>
